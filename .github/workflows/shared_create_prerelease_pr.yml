# Reusable workflow that opens a release PR:
#   1. Calculates the next version from CHANGELOG.md unreleased entries (release-toolkit).
#   2. Bumps the version in the specified Cargo.toml.
#   3. Opens a PR from a 'chore/release-<version>' branch with CHANGELOG notes as the PR body.
#   The actual GitHub pre-release is created by shared_create_prerelease.yml once the PR is merged.
name: 📞 Create release PR

on:
  workflow_call:
    inputs:
      cargo_toml_path:
        description: Path to the Cargo.toml containing the version field to bump.
        required: false
        type: string
        default: Cargo.toml
      bot_name:
        description: Git author name used for the release commit.
        required: false
        type: string
        default: agent-control-bot
      bot_email:
        description: Git author email used for the release commit.
        required: false
        type: string
        default: agent-control-team@newrelic.com

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Create release PR
    runs-on: ubuntu-latest
    steps:
      - name: Verify default branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ] || [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "This workflow must be triggered from the default branch ('${{ github.event.repository.default_branch }}'), got '${GITHUB_REF_NAME}'."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Generate release notes and update CHANGELOG
        id: release-data
        uses: newrelic/release-toolkit/contrib/ohi-release-notes@e28834c3115d501cd42e8458f058591d34bf045f # v1
        with:
          # overrides the default "v" prefix for the version.
          output-prefix: ""

      - name: Skip release if no changes found
        if: steps.release-data.outputs.skip-release == 'true'
        run: |
          echo "No unreleased entries or dependencies updated found. Skipping pre-release."

      - name: Configure git
        if: steps.release-data.outputs.skip-release != 'true'
        run: |
          git config user.name '${{ inputs.bot_name }}'
          git config user.email '${{ inputs.bot_email }}'

      - name: Bump version in Cargo.toml
        if: steps.release-data.outputs.skip-release != 'true'
        run: |
          cargo install cargo-edit
          cargo set-version --manifest-path "${{ inputs.cargo_toml_path }}" "${{ steps.release-data.outputs.next-version }}"

          echo "Bumped version to "${{ steps.release-data.outputs.next-version }}" in ${{ inputs.cargo_toml_path }}"

      - name: Create release PR
        if: steps.release-data.outputs.skip-release != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="chore/release-${{ steps.release-data.outputs.next-version }}"
          git checkout -b "$branch"
          git add CHANGELOG.md "${{ inputs.cargo_toml_path }}"
          git commit -m "chore(release): prepare ${{ steps.release-data.outputs.next-version }}"
          git push -u origin "$branch" --force
          gh pr create \
            --title "chore(release): prepare ${{ steps.release-data.outputs.next-version }}" \
            --body-file CHANGELOG.partial.md \
            --base "${{ github.event.repository.default_branch }}"
